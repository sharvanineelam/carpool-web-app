<!DOCTYPE html>
<html>

<head>

<title>My Rides</title>

<link rel="stylesheet" href="css/style.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

.page-title{
text-align:center;
margin-top:60px;
margin-bottom:25px;
font-size:30px;
font-weight:600;
}

.rides-container{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:20px;
margin-top:30px;
}

.ride-card{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 6px 20px rgba(0,0,0,0.1);
width:260px;
}

.delete-btn{
background:#ef4444;
color:white;
border:none;
padding:10px;
border-radius:6px;
cursor:pointer;
margin-top:10px;
width:100%;
}

.delete-btn:hover{
background:#dc2626;
}

</style>

</head>

<body>

<nav class="navbar">

<h2><i class="fa-solid fa-car"></i> CarPool</h2>

<ul>

<li><a href="dashboard.html"><i class="fa-solid fa-house"></i> Home</a></li>

<li><a href="postride.html"><i class="fa-solid fa-circle-plus"></i> Create Ride</a></li>

<li><a href="searchride.html"><i class="fa-solid fa-magnifying-glass"></i> Find Ride</a></li>

<li><a href="profile.html"><i class="fa-solid fa-user"></i> Profile</a></li>

<li><a href="index.html"><i class="fa-solid fa-right-from-bracket"></i> Logout</a></li>

</ul>

</nav>

<h1 class="page-title">
<i class="fa-solid fa-list"></i> My Posted Rides
</h1>

<div id="ridesList" class="rides-container"></div>

<footer class="footer">

<p>© 2026 CarPool Platform | Ride Sharing Web Application</p>

</footer>

<script>

function loadMyRides(){

let rides = JSON.parse(localStorage.getItem("rides")) || []

let container = document.getElementById("ridesList")

container.innerHTML = ""

if(rides.length === 0){

container.innerHTML = "<p>No rides posted yet</p>"
return

}

rides.forEach((ride,index)=>{

let card = document.createElement("div")

card.className = "ride-card"

card.innerHTML = `

<h3>${ride.source} → ${ride.destination}</h3>

<p><i class="fa-solid fa-user-group"></i> Seats: ${ride.seats}</p>

<p><i class="fa-solid fa-indian-rupee-sign"></i> Price: ₹${ride.price}</p>

<button class="delete-btn" onclick="deleteRide(${index})">
Delete Ride
</button>

`

container.appendChild(card)

})

}

function deleteRide(index){

let rides = JSON.parse(localStorage.getItem("rides")) || []

rides.splice(index,1)

localStorage.setItem("rides",JSON.stringify(rides))

loadMyRides()

}

loadMyRides()

</script>

</body>

</html>
