<!DOCTYPE html>
<html>

<head>

<title>Find Ride</title>

<link rel="stylesheet" href="css/style.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

.page-title{
text-align:center;
margin-top:60px;
margin-bottom:25px;
font-size:30px;
font-weight:600;
}

.search-card{
width:380px;
margin:auto;
background:white;
padding:30px;
border-radius:12px;
box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

.search-card input{
width:100%;
padding:12px;
border-radius:8px;
border:1px solid #ddd;
margin-bottom:12px;
}

.primary-btn{
background:#2563eb;
color:white;
border:none;
padding:14px;
border-radius:8px;
width:100%;
font-size:16px;
cursor:pointer;
}

.primary-btn:hover{
background:#1e40af;
}

.results{
margin-top:40px;
display:flex;
justify-content:center;
flex-wrap:wrap;
gap:20px;
}

.ride-card{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 6px 20px rgba(0,0,0,0.1);
width:260px;
}

.ride-card h3{
margin-bottom:8px;
}

</style>

</head>

<body>

<nav class="navbar">

<h2><i class="fa-solid fa-car"></i> CarPool</h2>

<ul>

<li><a href="dashboard.html"><i class="fa-solid fa-house"></i> Home</a></li>

<li><a href="postride.html"><i class="fa-solid fa-circle-plus"></i> Create Ride</a></li>

<li><a href="myrides.html"><i class="fa-solid fa-list"></i> My Rides</a></li>

<li><a href="profile.html"><i class="fa-solid fa-user"></i> Profile</a></li>

<li><a href="index.html"><i class="fa-solid fa-right-from-bracket"></i> Logout</a></li>

</ul>

</nav>


<h1 class="page-title">
<i class="fa-solid fa-magnifying-glass"></i> Find a Ride
</h1>


<div class="search-card">

<input type="text" id="searchSource" placeholder="Enter Source">

<input type="text" id="searchDestination" placeholder="Enter Destination">

<button class="primary-btn" onclick="searchRide()">Search Ride</button>

</div>


<div id="results" class="results"></div>


<footer class="footer">

<p>© 2026 CarPool Platform | Ride Sharing Web Application</p>

</footer>


<script>

function searchRide(){

let source=document.getElementById("searchSource").value.toLowerCase()

let destination=document.getElementById("searchDestination").value.toLowerCase()

let rides=JSON.parse(localStorage.getItem("rides")) || []

let results=document.getElementById("results")

results.innerHTML=""

let filtered=rides.filter(r =>
r.source.toLowerCase().includes(source) &&
r.destination.toLowerCase().includes(destination)
)

if(filtered.length===0){

results.innerHTML="<p>No rides found</p>"

return

}

filtered.forEach(r=>{

let card=document.createElement("div")

card.className="ride-card"

card.innerHTML=`

<h3>${r.source} → ${r.destination}</h3>

<p><i class="fa-solid fa-user-group"></i> Seats: ${r.seats}</p>

<p><i class="fa-solid fa-indian-rupee-sign"></i> Price: ₹${r.price}</p>

`

results.appendChild(card)

})

}

</script>

</body>

</html>
